<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাল্যবিবাহ প্রতিরোধ অভিযোগ ফর্ম</title>
    <style>
        :root {
            --primary-red: #e63946;
            --dark-red: #c1121f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #1d3557;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 10px solid var(--primary-red);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-red);
            font-size: 26px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: #555;
            font-size: 14px;
            margin-top: 5px;
        }

        .alert-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffeeba;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-red);
            outline: none;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.1);
        }

        .submit-btn {
            background-color: var(--primary-red);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--dark-red);
            box-shadow: 0 5px 15px rgba(193, 18, 31, 0.3);
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h1>বাল্যবিবাহ প্রতিরোধ</h1>
        <p>একটি সুন্দর সমাজ গড়তে সহায়তা করুন</p>
    </div>

    <div class="alert-box">
        <strong>গোপনীয়তা নিশ্চিত:</strong> আপনার সকল তথ্য আমাদের কাছে নিরাপদ থাকবে।
    </div>
