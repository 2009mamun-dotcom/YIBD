<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Submission Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input[type="text"], input[type="tel"], input[type="number"], textarea, input[type="file"] {
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        textarea { resize: vertical; }
        button {
            width: 100%; background-color: #007bff; color: white; border: none; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .note { font-size: 12px; color: #777; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>অভিযোগ ফরম</h2>
    
    <form action="https://formspree.io/f/xnjolvzw" method="POST" enctype="multipart/form-data">
        
        <label for="name">আপনার নাম (Full Name):</label>
        <input type="text" id="name" name="Full Name" placeholder="নাম লিখুন" required>

        <label for="phone">মোবাইল নম্বর (Mobile Number):</label>
        <input type="tel" id="phone" name="Phone Number" placeholder="০১XXXXXXXXX" required>

        <label for="location">ঠিকানা বিস্তারিত (Location Details):</label>
        <textarea id="location" name="Location" rows="3" placeholder="গ্রাম, থানা, জেলা..." required></textarea>

        <label for="reason">অভিযোগের কারণ (Reason):</label>
        <textarea id="reason" name="Complaint Reason" rows="4" placeholder="আপনার অভিযোগটি লিখুন" required></textarea>

        <label for="age">সন্দেহভাজনের বয়স (Suspect Age):</label>
        <input type="number" id="age" name="Suspect Age" placeholder="বয়স (যদি জানা থাকে)">

     
        <button type="submit">অভিযোগ জমা দিন</button>
        
        <p class="note">* তথ্য সাবমিট করার পর স্বয়ংক্রিয়ভাবে ইমেইল চলে যাবে।</p>
    </form>
</div>

</body>
</html>
